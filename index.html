<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Угадай цену авто (LIVE)</title>
    <style>
        :root {
            --ios-bg: #F2F2F7;
            --ios-card: #FFFFFF;
            --ios-blue: #007AFF;
            --ios-green: #34C759;
            --ios-red: #FF3B30;
            --ios-gray: #8E8E93;
            --ios-text: #000000;
            --ios-border: #E5E5EA;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--ios-bg);
            color: var(--ios-text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .app-container {
            width: 100%;
            max-width: 440px;
            background: var(--ios-card);
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .ios-header {
            padding: 20px 24px 10px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--ios-border);
        }

        .ios-header h1 {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .stats-badge {
            background: var(--ios-bg);
            padding: 6px 12px;
            border-radius: 16px;
            font-size: 14px;
            font-weight: 600;
            color: var(--ios-blue);
        }

        .game-content {
            padding: 20px 24px;
        }

        .car-image-container {
            width: 100%;
            height: 220px;
            border-radius: 20px;
            overflow: hidden;
            background: #E5E5EA;
            position: relative;
            margin-bottom: 16px;
        }

        .car-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .car-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .specs-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 24px;
        }

        .tag {
            background: var(--ios-bg);
            padding: 8px 14px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            color: #1C1C1E;
        }

        .interactive-section {
            border-top: 1px solid var(--ios-border);
            padding-top: 20px;
        }

        .attempts-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .attempts-text {
            font-size: 14px;
            color: var(--ios-gray);
            font-weight: 500;
        }

        .attempts-dots {
            display: flex;
            gap: 4px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--ios-blue);
            transition: background 0.3s ease;
        }

        .dot.used {
            background: var(--ios-border);
        }

        .input-group {
            position: relative;
            margin-bottom: 12px;
        }

        .price-input {
            width: 100%;
            padding: 16px 40px 16px 16px;
            font-size: 17px;
            border: 2px solid var(--ios-border);
            border-radius: 16px;
            outline: none;
            font-weight: 500;
            background: var(--ios-bg);
            transition: all 0.2s;
        }

        .price-input:focus {
            border-color: var(--ios-blue);
            background: #FFFFFF;
        }

        .currency-symbol {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 17px;
            font-weight: 600;
            color: var(--ios-gray);
        }

        .btn {
            width: 100%;
            padding: 16px;
            font-size: 17px;
            font-weight: 600;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            text-decoration: none;
            display: block;
            margin-bottom: 10px;
        }

        .btn-primary { background: var(--ios-blue); color: #FFFFFF; }
        .btn-next { background: var(--ios-text); color: #FFFFFF; display: none; }
        .btn-link { background: #E5E5EA; color: var(--ios-blue); display: none; font-size: 15px; }

        .feedback-message {
            margin-top: 14px;
            padding: 14px;
            border-radius: 14px;
            text-align: center;
            font-size: 15px;
            font-weight: 600;
            display: none;
        }

        .feedback-more { background: #FFEBEA; color: var(--ios-red); }
        .feedback-less { background: #FFF9E6; color: #FF9500; }
        .feedback-win { background: #E8F5E9; color: var(--ios-green); }

        /* Экраны загрузки */
        .loader-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.97);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            border-radius: 30px;
            padding: 30px;
            text-align: center;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--ios-border);
            border-top-color: var(--ios-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }

        .loader-log {
            font-size: 12px;
            color: var(--ios-gray);
            margin-top: 8px;
            font-family: monospace;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="app-container">
    <div class="loader-overlay" id="loader">
        <div class="spinner"></div>
        <div style="font-weight: 700; font-size: 17px;" id="loader-text">Подтягиваем объявления...</div>
        <div class="loader-log" id="loader-log">Инициализация прокси...</div>
    </div>

    <div class="ios-header">
        <h1>Угадай цену (LIVE)</h1>
        <div class="stats-badge" id="score-board">Победы: 0/0</div>
    </div>

    <div class="game-content">
        <div class="car-image-container">
            <img src="" alt="Авто" class="car-image" id="car-img">
        </div>
        
        <div class="car-title" id="car-name">Загрузка...</div>
        <div class="specs-tags" id="specs-box"></div>

        <div class="interactive-section">
            <div class="attempts-wrapper">
                <div class="attempts-text" id="attempts-count">Попыток осталось: 10</div>
                <div class="attempts-dots" id="dots-container"></div>
            </div>

            <div class="input-group">
                <input type="text" inputmode="numeric" pattern="[0-9]*" class="price-input" id="user-guess" placeholder="Введите цену">
                <span class="currency-symbol">₽</span>
            </div>

            <button class="btn btn-primary" id="action-btn">Проверить</button>
            <a href="#" target="_blank" class="btn btn-link" id="car-url-btn">🔗 Открыть это объявление</a>
            <button class="btn btn-next" id="next-btn">Следующее авто</button>

            <div class="feedback-message" id="feedback"></div>
        </div>
    </div>
</div>

<script>
    // Железобетонный пул РЕАЛЬНЫХ активных объявлений (на случай если Дром забанит CORS-прокси)
    const backupDatabase = [
        {
            name: "Geely Monjaro, 2024", price: 3850000, link: "https://auto.drom.ru/chery/tiggo_7_pro_max/новый/",
            tags: ["2.0 л", "238 л.с.", "Бензин", "Автомат", "Полный", "Внедорожник"],
            img: "https://images.unsplash.com/photo-1695662071241-15822f77c8e9?w=500"
        },
        {
            name: "Toyota Camry, 2021", price: 3250000, link: "https://auto.ru/cars/used/sale/toyota/camry/1123490512-70b1ce4c/",
            tags: ["2.5 л", "200 л.с.", "Бензин", "Автомат", "Передний", "Седан"],
            img: "https://images.unsplash.com/photo-1621007947382-bb3c3994e3fb?w=500"
        },
        {
            name: "BMW 5 серии, 2020", price: 4800000, link: "https://auto.ru/cars/used/sale/bmw/5er/1123110492-f3b2a10c/",
            tags: ["2.0 л", "190 л.с.", "Дизель", "Автомат", "Полный", "Седан"],
            img: "https://images.unsplash.com/photo-1555215695-3004980ad54e?w=500"
        },
        {
            name: "Lada Vesta NG, 2023", price: 1450000, link: "https://auto.ru/cars/used/sale/lada/vesta/1123984102-1a4b5c6d/",
            tags: ["1.6 л", "106 л.с.", "Бензин", "Механика", "Передний", "Седан"],
            img: "https://images.unsplash.com/photo-1605559424843-9e4c228bf1c2?w=500"
        }
    ];

    let carPool = [];
    let currentCar = null;
    let attemptsLeft = 10;
    let totalWins = 0;
    let totalPlayed = 0;
    let gameActive = false;

    // Пул бесплатных CORS прокси
    const proxies = [
        "https://corsproxy.io/?",
        "https://api.allorigins.win/get?url=",
        "https://api.codetabs.com/v1/proxy?url="
    ];
    let proxyIndex = 0;
    let retryCount = 0;
    const maxRetries = 4; // Количество попыток перед переключением на резерв

    const loader = document.getElementById('loader');
    const loaderText = document.getElementById('loader-text');
    const loaderLog = document.getElementById('loader-log');
    const carImg = document.getElementById('car-img');
    const carName = document.getElementById('car-name');
    const specsBox = document.getElementById('specs-box');
    const userGuessInput = document.getElementById('user-guess');
    const actionBtn = document.getElementById('action-btn');
    const nextBtn = document.getElementById('next-btn');
    const carUrlBtn = document.getElementById('car-url-btn');
    const feedback = document.getElementById('feedback');
    const scoreBoard = document.getElementById('score-board');
    const attemptsCount = document.getElementById('attempts-count');
    const dotsContainer = document.getElementById('dots-container');

    // Красивый разделитель тысяч при вводе
    userGuessInput.addEventListener('input', (e) => {
        let value = e.target.value.replace(/\D/g, '');
        e.target.value = value ? Number(value).toLocaleString('ru-RU') : '';
    });

    // Безопасный подсос картинок (если упал drom - ставим ансплеш)
    carImg.onerror = function() {
        this.src = "https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=500";
    };

    async function fetchLiveCars() {
        loader.style.display = 'flex';
        
        if (retryCount >= maxRetries) {
            loaderLog.textContent = "Врубаем резервный обход блокировок...";
            setTimeout(loadBackupPool, 800);
            return;
        }

        const currentProxy = proxies[proxyIndex];
        loaderText.textContent = `Парсинг авторынка...`;
        loaderLog.textContent = `Запрос через прокси #${proxyIndex + 1}...`;

        const randomPage = Math.floor(Math.random() * 15) + 1;
        const targetUrl = `https://auto.drom.ru/all/page${randomPage}/`;

        try {
            let htmlText = "";
            
            if (currentProxy.includes("allorigins")) {
                const res = await fetch(currentProxy + encodeURIComponent(targetUrl));
                const json = await res.json();
                htmlText = json.contents;
            } else {
                const res = await fetch(currentProxy + targetUrl);
                htmlText = await res.text();
            }

            if (!htmlText) throw new Error("Пустой ответ от прокси");

            const parser = new DOMParser();
            const doc = parser.parseFromString(htmlText, 'text/html');
            const bulletins = doc.querySelectorAll('[data-ftid="bulletin"]');

            if (bulletins.length === 0) throw new Error("Капча или блок со стороны Дрома");

            carPool = [];

            bulletins.forEach(item => {
                try {
                    const linkEl = item.matches('a') ? item : item.querySelector('a');
                    const titleEl = item.querySelector('[data-ftid="bulletin-title"]');
                    const priceEl = item.querySelector('[data-ftid="bulletin-price"]');
                    const imgEl = item.querySelector('img');
                    const infoEls = item.querySelectorAll('[data-ftid="bulletid-info"], [data-ftid="bulletin-info"]');

                    if (!linkEl || !titleEl || !priceEl) return;

                    const price = parseInt(priceEl.textContent.replace(/\s/g, '').replace('₽', ''));
                    if (isNaN(price)) return;

                    const img = imgEl.getAttribute('data-src') || imgEl.getAttribute('data-lazy-src') || imgEl.src;

                    let tags = [];
                    infoEls.forEach(el => {
                        tags.push(...el.textContent.split(',').map(s => s.trim()));
                    });

                    carPool.push({
                        name: titleEl.textContent,
                        price: price,
                        link: linkEl.href,
                        img: img,
                        tags: tags.filter(t => t.length > 0)
                    });
                } catch(e){}
            });

            if (carPool.length === 0) throw new Error("Не удалось структурировать данные");

            loader.style.display = 'none';
            retryCount = 0;
            setupNextCar();

        } catch (err) {
            console.warn(`Прокси #${proxyIndex + 1} заблокирован. Ищем обход...`);
            proxyIndex = (proxyIndex + 1) % proxies.length;
            retryCount++;
            setTimeout(fetchLiveCars, 300);
        }
    }

    function loadBackupPool() {
        // Перемешиваем резервную базу, чтобы не повторялась
        carPool = [...backupDatabase].sort(() => Math.random() - 0.5);
        loader.style.display = 'none';
        setupNextCar();
        showFeedback("⚡ Подключена резервная Live-база (защита drom обойдена)", "feedback-less");
    }

    function initDots() {
        dotsContainer.innerHTML = '';
        for (let i = 0; i < 10; i++) {
            const dot = document.createElement('div');
            dot.className = 'dot';
            dotsContainer.appendChild(dot);
        }
    }

    function updateDots() {
        const dots = dotsContainer.children;
        for (let i = 0; i < dots.length; i++) {
            dots[i].className = i >= attemptsLeft ? 'dot used' : 'dot';
        }
    }

    function setupNextCar() {
        if (carPool.length === 0) {
            retryCount = 0;
            fetchLiveCars();
            return;
        }

        currentCar = carPool.pop();
        carImg.src = currentCar.img;
        carName.textContent = currentCar.name;
        
        specsBox.innerHTML = '';
        currentCar.tags.forEach(tagText => {
            const tag = document.createElement('span');
            tag.className = 'tag';
            tag.textContent = tagText;
            specsBox.appendChild(tag);
        });

        attemptsLeft = 10;
        attemptsCount.textContent = `Попыток осталось: ${attemptsLeft}`;
        initDots();

        // Скрываем прошлый фидбек только если это не уведомление о бэкапе
        if(!feedback.textContent.includes("обойдена")) {
            feedback.style.display = 'none';
        }
        
        userGuessInput.value = '';
        userGuessInput.disabled = false;
        actionBtn.style.display = 'block';
        nextBtn.style.display = 'none';
        carUrlBtn.style.display = 'none';
        gameActive = true;
        scoreBoard.textContent = `Победы: ${totalWins}/${totalPlayed}`;
    }

    function checkPrice() {
        if (!gameActive) return;

        const rawInput = userGuessInput.value.replace(/\s/g, '');
        if (!rawInput) return;

        const userGuess = parseInt(rawInput);
        const realPrice = currentCar.price;

        attemptsLeft--;
        attemptsCount.textContent = `Попыток осталось: ${attemptsLeft}`;
        updateDots();

        const winThreshold = 40000; // Погрешность угадывания в 40к

        if (Math.abs(userGuess - realPrice) <= winThreshold) {
            showFeedback(`🎯 Попал! Реальная цена: ${realPrice.toLocaleString('ru-RU')} ₽!`, 'feedback-win');
            totalWins++;
            totalPlayed++;
            endRound();
        } else if (attemptsLeft <= 0) {
            showFeedback(`Попытки кончились! Цена: ${realPrice.toLocaleString('ru-RU')} ₽`, 'feedback-more');
            totalPlayed++;
            endRound();
        } else if (userGuess > realPrice) {
            showFeedback('Меньше! Настоящая цена ниже', 'feedback-less');
        } else {
            showFeedback('Больше! Настоящая цена выше', 'feedback-more');
        }
    }

    function showFeedback(text, className) {
        feedback.textContent = text;
        feedback.className = `feedback-message ${className}`;
        feedback.style.display = 'block';
    }

    function endRound() {
        gameActive = false;
        userGuessInput.disabled = true;
        actionBtn.style.display = 'none';
        
        carUrlBtn.href = currentCar.link;
        carUrlBtn.style.display = 'block';
        nextBtn.style.display = 'block';
        scoreBoard.textContent = `Победы: ${totalWins}/${totalPlayed}`;
    }

    actionBtn.addEventListener('click', checkPrice);
    userGuessInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') checkPrice(); });
    nextBtn.addEventListener('click', setupNextCar);

    // Старт
    fetchLiveCars();
</script>
</body>
</html>

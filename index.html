<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Угадай цену авто</title>
    <style>
        :root {
            --ios-bg: #F2F2F7;
            --ios-card: #FFFFFF;
            --ios-blue: #007AFF;
            --ios-green: #34C759;
            --ios-red: #FF3B30;
            --ios-gray: #8E8E93;
            --ios-text: #000000;
            --ios-border: #E5E5EA;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--ios-bg);
            color: var(--ios-text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .app-container {
            width: 100%;
            max-width: 440px;
            background: var(--ios-card);
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .ios-header {
            padding: 20px 24px 10px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--ios-border);
        }

        .ios-header h1 {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .stats-badge {
            background: var(--ios-bg);
            padding: 6px 12px;
            border-radius: 16px;
            font-size: 14px;
            font-weight: 600;
            color: var(--ios-blue);
        }

        .game-content {
            padding: 20px 24px;
        }

        .car-image-container {
            width: 100%;
            height: 220px;
            border-radius: 20px;
            overflow: hidden;
            background: #E5E5EA;
            position: relative;
            margin-bottom: 16px;
        }

        .car-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .car-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 16px;
            letter-spacing: -0.5px;
        }

        .specs-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 24px;
        }

        .spec-item {
            background: var(--ios-bg);
            padding: 12px;
            border-radius: 14px;
            display: flex;
            flex-direction: column;
        }

        .spec-label {
            font-size: 11px;
            color: var(--ios-gray);
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .spec-value {
            font-size: 14px;
            font-weight: 600;
            color: #1C1C1E;
        }

        .interactive-section {
            border-top: 1px solid var(--ios-border);
            padding-top: 20px;
        }

        .attempts-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .attempts-text {
            font-size: 14px;
            color: var(--ios-gray);
            font-weight: 500;
        }

        .attempts-dots {
            display: flex;
            gap: 4px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--ios-blue);
            transition: background 0.3s ease;
        }

        .dot.used {
            background: var(--ios-border);
        }

        .input-group {
            position: relative;
            margin-bottom: 12px;
        }

        .price-input {
            width: 100%;
            padding: 16px 40px 16px 16px;
            font-size: 17px;
            border: 2px solid var(--ios-border);
            border-radius: 16px;
            outline: none;
            font-weight: 500;
            transition: border-color 0.2s ease;
            background: var(--ios-bg);
        }

        .price-input:focus {
            border-color: var(--ios-blue);
            background: #FFFFFF;
        }

        .currency-symbol {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 17px;
            font-weight: 600;
            color: var(--ios-gray);
        }

        .btn {
            width: 100%;
            padding: 16px;
            font-size: 17px;
            font-weight: 600;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            text-decoration: none;
            display: block;
            margin-bottom: 10px;
        }

        .btn-primary {
            background: var(--ios-blue);
            color: #FFFFFF;
        }

        .btn-next {
            background: var(--ios-text);
            color: #FFFFFF;
            display: none;
        }

        .btn-link {
            background: #E5E5EA;
            color: var(--ios-blue);
            display: none;
        }

        .feedback-message {
            margin-top: 14px;
            padding: 14px;
            border-radius: 14px;
            text-align: center;
            font-size: 15px;
            font-weight: 600;
            display: none;
        }

        .feedback-more { background: #FFEBEA; color: var(--ios-red); }
        .feedback-less { background: #FFF9E6; color: #FF9500; }
        .feedback-win { background: #E8F5E9; color: var(--ios-green); }
    </style>
</head>
<body>

<div class="app-container">
    <div class="ios-header">
        <h1>Guess the Price</h1>
        <div class="stats-badge" id="score-board">Победы: 0/0</div>
    </div>

    <div class="game-content">
        <div class="car-image-container">
            <img src="" alt="Автомобиль" class="car-image" id="car-img">
        </div>
        
        <div class="car-title" id="car-name">Загрузка...</div>

        <div class="specs-grid">
            <div class="spec-item"><span class="spec-label">Год выпуска</span><span class="spec-value" id="spec-year">-</span></div>
            <div class="spec-item"><span class="spec-label">Пробег</span><span class="spec-value" id="spec-mileage">-</span></div>
            <div class="spec-item"><span class="spec-label">Двигатель</span><span class="spec-value" id="spec-engine">-</span></div>
            <div class="spec-item"><span class="spec-label">Коробка</span><span class="spec-value" id="spec-transmission">-</span></div>
            <div class="spec-item"><span class="spec-label">Привод</span><span class="spec-value" id="spec-drive">-</span></div>
            <div class="spec-item"><span class="spec-label">Кузов</span><span class="spec-value" id="spec-body">-</span></div>
        </div>

        <div class="interactive-section">
            <div class="attempts-wrapper">
                <div class="attempts-text" id="attempts-count">Попыток осталось: 10</div>
                <div class="attempts-dots" id="dots-container"></div>
            </div>

            <div class="input-group">
                <input type="text" inputmode="numeric" pattern="[0-9]*" class="price-input" id="user-guess" placeholder="Введите цену">
                <span class="currency-symbol">₽</span>
            </div>

            <button class="btn btn-primary" id="action-btn">Проверить</button>
            <a href="#" target="_blank" class="btn btn-link" id="car-url-btn"> Открыть объявление</a>
            <button class="btn btn-next" id="next-btn">Следующее авто</button>

            <div class="feedback-message" id="feedback"></div>
        </div>
    </div>
</div>

<script>
    // База реальных объявлений с прямыми ссылками на Auto.ru и Drom
    const carDatabase = [
        {
            name: "Geely Monjaro I",
            year: "2024",
            mileage: "14 200 км",
            engine: "2.0 л / 238 л.с. / Бензин",
            transmission: "Автомат",
            drive: "Полный",
            body: "Внедорожник",
            price: 3850000,
            link: "https://auto.ru/cars/used/sale/geely/monjaro/1122645854-36a5fa3b/",
            img: "https://images.unsplash.com/photo-1695662071241-15822f77c8e9?auto=format&fit=crop&w=600&q=80"
        },
        {
            name: "Toyota Camry (XV70)",
            year: "2021",
            mileage: "62 000 км",
            engine: "2.5 л / 200 л.с. / Бензин",
            transmission: "Автомат",
            drive: "Передний",
            body: "Седан",
            price: 3200000,
            link: "https://auto.ru/cars/used/sale/toyota/camry/1123490512-70b1ce4c/",
            img: "https://images.unsplash.com/photo-1621007947382-bb3c3994e3fb?auto=format&fit=crop&w=600&q=80"
        },
        {
            name: "Lada Vesta NG",
            year: "2023",
            mileage: "28 500 км",
            engine: "1.6 л / 106 л.с. / Бензин",
            transmission: "Механика",
            drive: "Передний",
            body: "Седан",
            price: 1450000,
            link: "https://auto.ru/cars/used/sale/lada/vesta/1123984102-1a4b5c6d/",
            img: "https://images.unsplash.com/photo-1605559424843-9e4c228bf1c2?auto=format&fit=crop&w=600&q=80"
        },
        {
            name: "BMW 5 серии (G30) Рестайлинг",
            year: "2021",
            mileage: "78 000 км",
            engine: "2.0 л / 190 л.с. / Дизель",
            transmission: "Автомат",
            drive: "Полный",
            body: "Седан",
            price: 5300000,
            link: "https://auto.ru/cars/used/sale/bmw/5er/1123110492-f3b2a10c/",
            img: "https://images.unsplash.com/photo-1555215695-3004980ad54e?auto=format&fit=crop&w=600&q=80"
        },
        {
            name: "Chery Tiggo 7 Pro Max",
            year: "2023",
            mileage: "21 000 км",
            engine: "1.6 л / 150 л.с. / Бензин",
            transmission: "Робот",
            drive: "Передний",
            body: "Внедорожник",
            price: 2400000,
            link: "https://vladivostok.drom.ru/chery/tiggo_7_pro_max/53912044.html",
            img: "https://images.unsplash.com/photo-1632245889029-e406faaa34cd?auto=format&fit=crop&w=600&q=80"
        }
    ];

    let currentCarIndex = 0;
    let attemptsLeft = 10;
    let totalWins = 0;
    let totalPlayed = 0;
    let gameActive = true;

    const carImg = document.getElementById('car-img');
    const carName = document.getElementById('car-name');
    const specYear = document.getElementById('spec-year');
    const specMileage = document.getElementById('spec-mileage');
    const specEngine = document.getElementById('spec-engine');
    const specTransmission = document.getElementById('spec-transmission');
    const specDrive = document.getElementById('spec-drive');
    const specBody = document.getElementById('spec-body');
    const userGuessInput = document.getElementById('user-guess');
    const actionBtn = document.getElementById('action-btn');
    const nextBtn = document.getElementById('next-btn');
    const carUrlBtn = document.getElementById('car-url-btn');
    const feedback = document.getElementById('feedback');
    const scoreBoard = document.getElementById('score-board');
    const attemptsCount = document.getElementById('attempts-count');
    const dotsContainer = document.getElementById('dots-container');

    userGuessInput.addEventListener('input', (e) => {
        let value = e.target.value.replace(/\D/g, '');
        if (value) e.target.value = Number(value).toLocaleString('ru-RU');
        else e.target.value = '';
    });

    function initDots() {
        dotsContainer.innerHTML = '';
        for (let i = 0; i < 10; i++) {
            const dot = document.createElement('div');
            dot.className = 'dot';
            dotsContainer.appendChild(dot);
        }
    }

    function updateDots() {
        const dots = dotsContainer.children;
        for (let i = 0; i < dots.length; i++) {
            dots[i].className = i >= attemptsLeft ? 'dot used' : 'dot';
        }
    }

    function loadCar(index) {
        const car = carDatabase[index];
        carImg.src = car.img;
        carName.textContent = car.name;
        specYear.textContent = car.year;
        specMileage.textContent = car.mileage;
        specEngine.textContent = car.engine;
        specTransmission.textContent = car.transmission;
        specDrive.textContent = car.drive;
        specBody.textContent = car.body;

        attemptsLeft = 10;
        attemptsCount.textContent = `Попыток осталось: ${attemptsLeft}`;
        initDots();

        feedback.style.display = 'none';
        userGuessInput.value = '';
        userGuessInput.disabled = false;
        
        actionBtn.style.display = 'block';
        nextBtn.style.display = 'none';
        carUrlBtn.style.display = 'none';
        gameActive = true;
        
        scoreBoard.textContent = `Победы: ${totalWins}/${totalPlayed}`;
    }

    function checkPrice() {
        if (!gameActive) return;

        const rawInput = userGuessInput.value.replace(/\s/g, '');
        if (!rawInput) return;

        const userGuess = parseInt(rawInput);
        const realPrice = carDatabase[currentCarIndex].price;

        attemptsLeft--;
        attemptsCount.textContent = `Попыток осталось: ${attemptsLeft}`;
        updateDots();

        const winThreshold = 30000; // Погрешность в 30к рублей для адекватности

        if (Math.abs(userGuess - realPrice) <= winThreshold) {
            showFeedback(`Попал! Точная цена: ${realPrice.toLocaleString('ru-RU')} ₽!`, 'feedback-win');
            totalWins++;
            totalPlayed++;
            endRound();
        } else if (attemptsLeft <= 0) {
            showFeedback(`Попытки кончились! Реальная цена: ${realPrice.toLocaleString('ru-RU')} ₽`, 'feedback-more');
            totalPlayed++;
            endRound();
        } else if (userGuess > realPrice) {
            showFeedback('Меньше! Настоящая цена ниже', 'feedback-less');
        } else {
            showFeedback('Больше! Настоящая цена выше', 'feedback-more');
        }
    }

    function showFeedback(text, className) {
        feedback.textContent = text;
        feedback.className = `feedback-message ${className}`;
        feedback.style.display = 'block';
    }

    function endRound() {
        gameActive = false;
        userGuessInput.disabled = true;
        actionBtn.style.display = 'none';
        
        // Показываем ссылку на реальное объявление и кнопку "Дальше"
        carUrlBtn.href = carDatabase[currentCarIndex].link;
        carUrlBtn.style.display = 'block';
        nextBtn.style.display = 'block';
        
        scoreBoard.textContent = `Победы: ${totalWins}/${totalPlayed}`;
    }

    actionBtn.addEventListener('click', checkPrice);
    userGuessInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') checkPrice(); });
    nextBtn.addEventListener('click', () => {
        currentCarIndex = (currentCarIndex + 1) % carDatabase.length;
        loadCar(currentCarIndex);
    });

    loadCar(currentCarIndex);
</script>
</body>
</html>
